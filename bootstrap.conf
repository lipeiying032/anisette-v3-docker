# ============================================================
#  bootstrap.conf — 仅用于【首次】申请 SSL 证书
#
#  使用流程：
#  1. 确保 anisette.conf 不在此目录（或先临时改名）
#  2. 将本文件放入 ./nginx/conf.d/
#  3. docker compose up -d nginx
#  4. 运行 certbot 申请证书（见 SETUP.md Step 3）
#  5. 证书申请成功后：
#       - 删除本文件（rm ./nginx/conf.d/bootstrap.conf）
#       - 将 anisette.conf 放回此目录
#       - docker compose restart nginx
#
#  ⚠️  本文件与 anisette.conf 不能同时存在，否则 nginx 会有
#     两个 server_name 冲突导致路由混乱
# ============================================================

server {
    listen 80;
    server_name your-domain.com;

    # Certbot webroot 验证路径
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # 临时返回 200，方便确认 nginx 正常运行
    location / {
        return 200 "bootstrap mode - cert provisioning in progress";
        add_header Content-Type text/plain;
    }
}
