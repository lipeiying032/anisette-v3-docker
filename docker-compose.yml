services:
  anisette:
    image: dadoum/anisette-v3-server:latest
    container_name: anisette-v3
    restart: always
    ports:
      - "6969:6969"
    volumes:
      - anisette_data:/home/Alcoholic/.config/anisette-v3/lib/
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:6969 > /dev/null || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 180s

volumes:
  anisette_data:
    name: anisette-v3_data