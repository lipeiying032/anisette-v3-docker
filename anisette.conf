# ============================================================
#  保存路径：./nginx/conf.d/anisette.conf
#  将所有 your-domain.com 替换为你的真实域名
#
#  ⚠️  首次部署分两步走（解决 SSL 证书鸡蛋问题）：
#  [BUG6 FIX] 原配置直接引用证书文件，但首次部署时证书尚不存在，
#             nginx 会因找不到 .pem 文件而 crash，无法启动。
#
#  Step 1: 先用 ./nginx/conf.d/bootstrap.conf 启动（仅 HTTP）
#          → 运行 certbot 申请证书
#          → 删除 bootstrap.conf
#  Step 2: 保留本文件（含 HTTPS 配置），重启 nginx
#
#  详见同目录的 bootstrap.conf
# ============================================================

# HTTP → HTTPS 重定向 + Let's Encrypt 验证
server {
    listen 80;
    server_name your-domain.com;

    # Certbot webroot 验证路径（续签时也需要）
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # 其他所有请求强制跳转 HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS 主服务
server {
    listen 443 ssl;
    server_name your-domain.com;

    ssl_certificate     /etc/letsencrypt/live/your-domain.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/your-domain.com/privkey.pem;

    # 现代 TLS 配置
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;

    # [BUG7 FIX] ssl_session_cache 和 ssl_session_timeout 必须配套
    # 原配置只有 cache 没有 timeout，session 永不过期导致缓存无意义
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 1d;

    # [BUG-B FIX] OCSP Stapling 已完全移除：
    # Let's Encrypt 于 2025 年 5 月 7 日停止为新签证书嵌入 OCSP URL。
    # 2025 年 8 月 6 日后所有 LE 证书均不再支持 OCSP。
    # 若保留 ssl_stapling on，nginx 会持续打印警告：
    #   "ssl_stapling" ignored, no OCSP responder URL in the certificate
    # ssl_trusted_certificate 也随之移除（它只服务于 OCSP 验证链）

    # 安全响应头
    add_header X-Content-Type-Options   nosniff always;
    add_header X-Frame-Options          DENY    always;
    add_header Strict-Transport-Security "max-age=63072000" always;

    # [BUG-C FIX] resolver 和 resolver_timeout 需配套使用
    # 没有 resolver_timeout 时默认超时 30s，一次 DNS 失败会阻塞请求 30s
    # 设为 5s：够用且不影响正常响应延迟
    resolver 127.0.0.11 valid=30s ipv6=off;
    resolver_timeout 5s;

    # set + 变量形式的 proxy_pass：强制 nginx 每次请求重新走 DNS（Docker 内嵌 DNS）
    # 防止 anisette 容器重启后 IP 变化导致持续 502
    set $anisette_upstream http://anisette:6969;

    location / {
        # [BUG-D FIX] 变量形式的 proxy_pass 在某些 location 前缀下会截断 URI。
        # 显式拼接 $request_uri 保证完整路径+查询参数原样转发，无歧义。
        proxy_pass         $anisette_upstream$request_uri;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout    60s;
        proxy_connect_timeout 10s;
    }
}
